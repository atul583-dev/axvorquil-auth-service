version: '3.9'

services:

  # ── MongoDB ──────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: axvorquil-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: axvorquil
      MONGO_INITDB_ROOT_PASSWORD: axvorquil_secret
      MONGO_INITDB_DATABASE: axvorquil_auth
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - axvorquil-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth Service ──────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axvorquil-auth
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://axvorquil:axvorquil_secret@mongodb:27017/axvorquil_auth?authSource=admin
      APP_JWT_SECRET: ${JWT_SECRET:-axvorquil-super-secret-key-change-in-production-256-bits}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8081}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - axvorquil-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Mongo Express (DB UI — dev only) ─────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: axvorquil-mongo-ui
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: axvorquil
      ME_CONFIG_MONGODB_ADMINPASSWORD: axvorquil_secret
      ME_CONFIG_MONGODB_URL: mongodb://axvorquil:axvorquil_secret@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8082:8081"
    networks:
      - axvorquil-network
    profiles:
      - dev   # only starts with: docker compose --profile dev up

volumes:
  mongo_data:
    driver: local

networks:
  axvorquil-network:
    driver: bridge
