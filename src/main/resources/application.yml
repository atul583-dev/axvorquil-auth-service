server:
  port: 8081

spring:
  application:
    name: axvorquil-auth-service

  data:
    mongodb:
      uri: mongodb+srv://atul583b:This583Works@cluster0.elwy7.mongodb.net/axvorquil_auth?appName=Cluster0

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  jwt:
    secret: axvorquil-super-secret-key-change-this-in-production-must-be-256-bits
    access-token-expiry-ms: 900000       # 15 minutes
    refresh-token-expiry-ms: 604800000   # 7 days
  mail:
    from: noreply@axvorquil.com
    from-name: Axvorquil

logging:
  level:
    com.axvorquil: DEBUG
    org.springframework.security: INFO

security:
  service:
    url: "${SECURITY_SERVICE_URL:http://localhost:8085}"

# ── Razorpay ──────────────────────────────────────────────────────────────
razorpay:
  key:
    id:     "${RAZORPAY_KEY_ID:rzp_test_placeholder}"
    secret: "${RAZORPAY_KEY_SECRET:placeholder_secret}"

# ── Service URLs for health aggregator ───────────────────────────────────
services:
  auth:        { url: "${AUTH_SERVICE_URL:http://localhost:8081}" }
  security:    { url: "${SECURITY_SERVICE_URL:http://localhost:8085}" }
  clinic:      { url: "${CLINIC_SERVICE_URL:http://localhost:8082}" }
  campaign:    { url: "${CAMPAIGN_SERVICE_URL:http://localhost:8083}" }
  stock:       { url: "${STOCK_SERVICE_URL:http://localhost:8084}" }
  legal:       { url: "${LEGAL_SERVICE_URL:https://axvorquil-legal-dqazb6aue5apehhg.canadacentral-01.azurewebsites.net}" }  # Azure deployed
  matchmaking: { url: "${MATCHMAKING_SERVICE_URL:https://axvorquil-matchmaking-ceehdehkbkftgjem.canadacentral-01.azurewebsites.net}" }  # Azure deployed
  health:      { url: "${HEALTH_SERVICE_URL:https://axvorquil-health-dwaagedjbeh2ehat.canadacentral-01.azurewebsites.net}" }  # Azure deployed
  vidya:       { url: "${VIDYA_SERVICE_URL:https://axvorquil-vidyaai-a5brgrfyeeefg2cc.canadacentral-01.azurewebsites.net}" }  # Azure deployed

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
